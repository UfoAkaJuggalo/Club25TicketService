<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Club 25</title>

    <!-- Bootstrap CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
  <div class="container-fluid no-padding">
    <app-root></app-root>
    <footer class="row justify-content-center ml-0 mr-0 pt-4 pb-4">
        <div class="col align-self-center text-center mt-3 mb-3">
            <div class="btn-group">
                <a class="btn btn-warning" href="#">
                    <i class="fa fa-facebook-square fa-2x" title="Facebook"></i>
                </a>
                <a class="btn btn-warning" href="#">
                    <i class="fa fa-twitter-square fa-2x" title="Twitter"></i>
                </a>
                <a class="btn btn-warning" href="#">
                    <i class="fa fa-google-plus-square fa-2x" title="Google plus"></i>
                </a>
                <a class="btn btn-warning" href="#">
                    <i class="fa fa-instagram fa-2x" title="Instagram"></i>
                </a>
            </div>
        </div>
        <div class="col align-self-center text-center mt-3 mb-3">
            <img src="/img/logo.png" alt="logo">
        </div>
        <div class="col align-self-center text-right font-italic mt-3 mb-3">
            <p class="mb-0"><i class="fa fa-copyright" aria-hidden="true"></i> 2017 Michał Nawrocki</p>
        </div>
    </footer>
  </div>

</body>
</html>
